site_name: MineColonies 自律コロニー実験
site_description: LLM市長エージェントによるMinecraft社会シミュレーション(卒業研究wiki)
site_author: atsushi-chiba
site_url: https://atsushi-chiba.github.io/Voyager/

repo_name: atsushi-chiba/Voyager
repo_url: https://github.com/atsushi-chiba/Voyager
edit_uri: edit/minecolonies-experiment/wiki/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ja
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え

nav:
  - はじめに: index.md
  - 研究の位置づけ: about.md
  - システム構成: system.md
  - 引き継ぎ: handoff.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - ja
        - en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/atsushi-chiba/Voyager
