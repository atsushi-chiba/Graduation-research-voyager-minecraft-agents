name: Deploy wiki to GitHub Pages

on:
  push:
    branches:
      - minecolonies-experiment
    paths:
      - 'wiki/**'
      - '.github/workflows/wiki-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: wiki/requirements.txt

      - name: Install dependencies
        run: pip install -r wiki/requirements.txt

      - name: Build MkDocs site
        working-directory: wiki
        run: mkdocs build --strict

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: wiki/site
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: wiki update from ${{ github.sha }}'
